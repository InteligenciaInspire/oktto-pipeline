name: Run Oktto Pipeline

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        required: true
        default: "sync_full"
        type: choice
        options:
          - sync_dimensions
          - sync_leads
          - sync_sales
          - sync_full
  schedule:
    - cron: "0 9 * * *"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      OKTTO_API_BASE_URL: ${{ secrets.OKTTO_API_BASE_URL }}
      OKTTO_API_TOKEN: ${{ secrets.OKTTO_API_TOKEN }}
      OKTTO_TIMEOUT_SECONDS: ${{ secrets.OKTTO_TIMEOUT_SECONDS }}
      OKTTO_MAX_RETRIES: ${{ secrets.OKTTO_MAX_RETRIES }}
      OKTTO_BACKOFF_FACTOR: ${{ secrets.OKTTO_BACKOFF_FACTOR }}
      OKTTO_PAGE_SIZE: ${{ secrets.OKTTO_PAGE_SIZE }}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
      GOOGLE_SHEETS_CREDENTIALS_JSON: credentials/service-account.json
      LOG_LEVEL: ${{ secrets.LOG_LEVEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google credentials file
        run: |
          mkdir -p credentials
          cat > credentials/service-account.json << 'EOF'
          ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON_CONTENT }}
          EOF

      - name: Select job
        id: select-job
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "job=sync_full" >> "$GITHUB_OUTPUT"
          else
            echo "job=${{ github.event.inputs.job }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run selected job
        run: |
          python -m src.main --job "${{ steps.select-job.outputs.job }}"
